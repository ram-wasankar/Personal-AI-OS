services:
  - type: web
    name: synapse-keeper-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: synapse_keeper
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://personal-ai-os-six.vercel.app,http://localhost:8080,http://127.0.0.1:8080"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
